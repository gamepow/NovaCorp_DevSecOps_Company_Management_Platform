# Nombre del flujo de trabajo: Pipeline de DevSecOps
# Este pipeline automatiza las pruebas de seguridad (SAST, SCA, DAST) y el despliegue.
name: DevSecOps Pipeline

on:
  # Se ejecuta en cada push y pull request a cualquier rama.
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # JOB 1: Análisis estático de seguridad (SAST) y de dependencias (SCA)
  security-checks:
    name: SAST + SCA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Instalar dependencias del proyecto
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 1. Ejecutar SAST (Semgrep) para encontrar vulnerabilidades en el código fuente.
      - name: Análisis SAST con Semgrep
        run: |
          pip install semgrep
          semgrep scan \
            --config "p/python" \
            --config "p/flask" \
            --config "p/owasp-top-ten" \
            --json \
            --output semgrep-results.json \
            . || true

      # 2. Generar un reporte visual en HTML a partir de los resultados de Semgrep.
      - name: Generar reporte HTML de Semgrep
        run: python scripts/generate_report.py

      # Subir el reporte SAST como un artefacto descargable desde GitHub Actions.
      - name: Subir reporte SAST como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: SAST-semgrep-report
          path: SAST-semgrep-report.html

      # 3. Ejecutar SCA (pip-audit) para detectar librerías vulnerables.
      - name: Análisis SCA con pip-audit
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --output pip-audit-results.txt || true

      # Subir los resultados del análisis de dependencias como artefacto.
      - name: Subir reporte SCA como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: SCA-pip-audit-results
          path: SCA-pip-audit-results.txt

      # 4. Evaluación de seguridad: Si se encuentran hallazgos con severidad 'ERROR', se bloquea el pipeline.
      - name: Evaluar criticidad y decidir resultado
        run: |
          python -c "
          import json, sys
          with open('semgrep-results.json') as f:
              data = json.load(f)
          results = data.get('results', [])
          # Filtramos los hallazgos críticos (severidad ERROR)
          critical = [r for r in results if r.get('extra',{}).get('severity') == 'ERROR']
          
          if critical:
              print(f'FALLO: Se encontraron {len(critical)} hallazgos CRÍTICOS.')
              print('El despliegue ha sido bloqueado automáticamente.')
              sys.exit(1) # Detiene el pipeline si hay errores críticos
          else:
              print('Sin hallazgos críticos. Pipeline autorizado para continuar.')
          "

  # JOB 2: Despliegue automático a Render
  # Este job solo se ejecuta si el job previo (security-checks) fue exitoso y estamos en la rama 'main'.
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: security-checks
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deployment
        run: |
          # Realiza una petición al Webhook de Render para iniciar el deploy.
          curl -f "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # JOB 3: Análisis dinámico de seguridad (DAST) con OWASP ZAP
  # Se ejecuta después del despliegue para analizar la aplicación en tiempo de ejecución.
  dast-zap:
    name: DAST con OWASP ZAP
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Paso crítico: Asegurar que la aplicación ya esté levantada en Render antes de escanear.
      - name: Esperar a que la aplicación esté disponible
        run: |
          echo "Esperando a que la aplicación esté activa..."
          for i in {1..12}; do
            if curl -s -L --fail "${{ secrets.APP_URL }}" > /dev/null; then
              echo "Aplicación disponible."
              exit 0
            fi
            sleep 10
          done
          exit 1

      # Ejecutar el escaneo completo de OWASP ZAP contra la URL de producción.
      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: "${{ secrets.APP_URL }}"
          allow_issue_writing: false

      # El artefacto será generado por la acción zaproxy/action-full-scan y se llamará 'zap_scan'.
      # El reporte DAST se sube como un artefacto descargable desde GitHub Actions.
      
# --- Fin del Pipeline de DevSecOps ---
