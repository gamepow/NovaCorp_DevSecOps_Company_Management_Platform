name: DevSecOps Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  security-checks:
    name: SAST + SCA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Instalar dependencias del proyecto
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── SAST: Semgrep ───────────────────────────────────────────
      - name: Análisis SAST con Semgrep
        run: |
          pip install semgrep
          semgrep scan \
            --config "p/python" \
            --config "p/flask" \
            --config "p/owasp-top-ten" \
            --json \
            --output semgrep-results.json \
            . || true

      # ─── Control de calidad (Quality Gate) ──────────────────────
      - name: Evaluar criticidad y decidir resultado
        run: |
          python -c "
          import json, sys
          with open('semgrep-results.json') as f:
              data = json.load(f)
          results = data.get('results', [])
          critical = [r for r in results if r.get('extra',{}).get('severity') == 'ERROR']
          if critical:
              print(f'ATENCIÓN: {len(critical)} hallazgo(s) CRÍTICOS detectados.')
              sys.exit(1) # Esto detiene el pipeline e impide el deploy
          else:
              print('Sin hallazgos críticos. Pipeline OK.')
          "

      - name: Generar reporte HTML de Semgrep
        if: always() # Se ejecuta aunque el paso anterior falle
        run: python scripts/generate_report.py

      - name: Subir reporte SAST como artefacto
        if: always() # Se ejecuta aunque el paso anterior falle
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report-html
          path: semgrep-report.html

      # ─── SCA: pip-audit ──────────────────────────────────────────
      - name: Análisis SCA con pip-audit
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --output pip-audit-results.txt || true

      - name: Subir reporte SCA como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.txt

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: security-checks # Solo inicia si security-checks termina con éxito
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deployment
        run: |
          curl -f "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  dast-zap:
    name: DAST con OWASP ZAP
    runs-on: ubuntu-latest
    needs: deploy # Solo inicia si el deploy terminó con éxito
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Esperar a que la aplicación esté disponible
        run: |
          echo "Esperando a que la aplicación esté activa en Render..."
          for i in {1..12}; do
            if curl -s -L --fail "${{ secrets.APP_URL }}" > /dev/null; then
              echo "Aplicación disponible."
              exit 0
            fi
            echo "Intento $i fallido. Reintentando..."
            sleep 10
          done
          exit 1

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: "${{ secrets.APP_URL }}"
          allow_issue_writing: false